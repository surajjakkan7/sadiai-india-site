<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — sadiaiindia</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">sadiaiindia</span>
    </a>
    <nav class="nav-links">
      <a href="index.html#try-on">Virtual Try-On</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="login.html">Log in</a>
    </nav>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-sub">Start previewing sarees with AI in minutes.</p>

    <div id="authError" class="auth-error"></div>

    <form class="auth-form" id="signupForm">
      <div>
        <label for="s-name">Full name</label>
        <input type="text" id="s-name" required>
      </div>
      <div>
        <label for="s-email">Email</label>
        <input type="email" id="s-email" required>
      </div>
      <div>
        <label for="s-password">Password</label>
        <input type="password" id="s-password" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

<!-- Firebase SDKs (compat build — matches typical Android/Firebase RTDB setups) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="script.js"></script>
<script>
  const signupForm = document.getElementById('signupForm');
  const authError = document.getElementById('authError');

  signupForm.addEventListener('submit', function (e) {
    e.preventDefault();
    authError.classList.remove('show');

    const name = document.getElementById('s-name').value.trim();
    const email = document.getElementById('s-email').value.trim();
    const password = document.getElementById('s-password').value;

    firebase.auth().createUserWithEmailAndPassword(email, password)
      .then((cred) => {
        return cred.user.updateProfile({ displayName: name });
      })
      .then(() => {
        window.location.href = 'index.html';
      })
      .catch((err) => {
        authError.textContent = err.message;
        authError.classList.add('show');
      });
  });
</script>
</body>
</html>
